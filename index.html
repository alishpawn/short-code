            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                        <span class="nav-link" id="itemCount">0 components</span>

        </div>

    <section class="gallery-section">
        <div class="container">
            <div class="gallery-header">
                <h1 class="gallery-title">UI Components</h1>
                <p class="gallery-subtitle">A collection of reusable UI components built with HTML, CSS &amp; JavaScript
                </p>
            </div>

            <div class="search-box">
                <div class="row justify-content-center">
                    <div class="col-lg-6 col-md-8">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search components...">
                            <button class="btn btn-outline-secondary" type="button" id="clearSearch">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="filter-chips" id="filterChips">
                <span class="chip active" data-category="all">All</span>
                <span class="chip" data-category="navigation">Navigation</span>
                <span class="chip" data-category="content">Content</span>
                <span class="chip" data-category="media">Media</span>
                <span class="chip" data-category="ui">UI Elements</span>
                <span class="chip" data-category="animation">Animation</span>
                <span class="chip" data-category="slider">Slider</span>
            </div>

            <div class="row g-4" id="itemsContainer"></div>

            <div class="no-results" id="noResults">
                <i class="fas fa-search"></i>
                <h3>No components found</h3>
                <p>Try adjusting your search or filter</p>
            </div>
        </div>
    </section>

    <footer class="gallery-footer">
        <div class="container">
            <p class="mb-0"><i class="fas fa-code"></i> Shortcodes Collection</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

            {

            },
            {
                title: 'Splide process bar',

                categories: ['slider'],

                icon: 'fa-sliders-h'
            },
            {

                url: 'tab-bootstrap/index.html',

                tags: ['Tabs', 'Bootstrap'],
                icon: 'fa-table'
            },
            {
                title: 'Tab raw',
                url: 'Tab-raw/index.html',
                categories: ['content'],
                tags: ['Tabs', 'jQuery'],
                img: 'image/Tab raw.png'
            },
            {
                title: 'Three col box',
                url: 'Three-col-box/index.html',
                categories: ['layout'],
                tags: ['Grid', 'Cards'],
                icon: 'fa-th'
            },
            {
                title: 'word changing smooth width',
                url: 'word-changing-smoooth-width/index.html',
                categories: ['animation', 'typography'],
                tags: ['Text', 'jQuery'],
                icon: 'fa-font'
            },
            {
                title: 'word changing step by step',
                url: 'word-changing-step-by-step/index.html',
                categories: ['animation', 'typography'],
                tags: ['Typewriter', 'jQuery'],
                icon: 'fa-keyboard'
            }
        ];

        function randomGradient() {
            const h1 = Math.floor(Math.random() * 360);
            const h2 = (h1 + 30 + Math.floor(Math.random() * 60)) % 360;
            return `linear-gradient(135deg, hsl(${h1}, 70%, 55%) 0%, hsl(${h2}, 65%, 50%) 100%)`;
        }

        components.forEach(c => {
            if (!c.img && !c.gradient) c.gradient = randomGradient();
        });

        const searchInput = document.getElementById('searchInput');
        const itemsContainer = document.getElementById('itemsContainer');
        const noResults = document.getElementById('noResults');
        const itemCount = document.getElementById('itemCount');
        const chips = document.querySelectorAll('.chip');
        const clearBtn = document.getElementById('clearSearch');

        let activeCategory = 'all';
        let searchTerm = '';

        function renderItems(data) {
            itemsContainer.innerHTML = data.map(c => {
                const cats = c.categories.concat(['all']).join(',');
                const imageHtml = c.img
                    ? `<img src="${c.img}" alt="${c.title}" loading="lazy">`
                    : `<div class="item-img-placeholder" style="background: ${c.gradient};"><i class="fas ${c.icon}"></i></div>`;
                const overlayHtml = c.external
                    ? `<span class="item-live-link"><i class="fas fa-external-link-alt"></i> Live</span>`
                    : `<span class="item-preview"><i class="fas fa-eye"></i> Preview</span>`;
                const tagsHtml = c.tags.map(t =>
                    `<span class="item-tag${t === 'jQuery' || t === 'JS' || t === 'Vanilla JS' ? ' item-tag-js' : ''}">${t}</span>`
                ).join('');

                return `<div class="col-xl-3 col-lg-4 col-md-6" data-category="${cats}">
                    <div class="item">
                        <a href="${c.url}" title="${c.title}">
                            <div class="item-image">
                                ${imageHtml}
                                <div class="item-overlay">
                                    ${overlayHtml}
                                </div>
                            </div>
                            <div class="item-body">
                                <div class="item-tags">${tagsHtml}</div>
                                <h3 class="item-title">${c.title}</h3>
                            </div>
                        </a>
                    </div>
                </div>`;
            }).join('');
        }

        function filterItems() {
            const items = itemsContainer.querySelectorAll('.col-xl-3');
            let visibleCount = 0;

            items.forEach(item => {
                const title = item.querySelector('.item-title').textContent.toLowerCase();
                const categories = item.dataset.category || '';

                const matchesSearch = title.includes(searchTerm);
                const matchesCategory = activeCategory === 'all' || categories.includes(activeCategory);

                if (matchesSearch && matchesCategory) {
                    item.style.display = '';
                    visibleCount++;
                } else {
                    item.style.display = 'none';
                }
            });

            noResults.style.display = visibleCount === 0 ? 'block' : 'none';
            itemCount.textContent = visibleCount + ' component' + (visibleCount !== 1 ? 's' : '');
        }

        renderItems(components);
        filterItems();

        searchInput.addEventListener('input', function () {
            searchTerm = this.value.toLowerCase().trim();
            filterItems();
        });

        clearBtn.addEventListener('click', function () {
            searchInput.value = '';
            searchTerm = '';
            filterItems();
            searchInput.focus();
        });

        chips.forEach(chip => {
            chip.addEventListener('click', function () {
                chips.forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                activeCategory = this.dataset.category;
                filterItems();
            });
        });
    </script>
</body>

</html>
