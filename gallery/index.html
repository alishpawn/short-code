<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery hover effect that follows cursor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="gallery" class="section-gaps hover-section">
    <div class="container">
      <h2 class="section-title">Gallery</h2>
      <p class="section-desc">Moments from our little coffee corner.</p>

      <div class="row">

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1511920170033-f8396924c348?auto=format&fit=crop&w=800&q=80" alt="Espresso">
            <div class="overlay">
              <span>Fresh Espresso</span>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=800&q=80" alt="Latte Art">
            <div class="overlay">
              <span>Latte Art</span>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?auto=format&fit=crop&w=800&q=80" alt="Coffee Beans">
            <div class="overlay">
              <span>Premium Beans</span>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1445116572660-236099ec97a0?auto=format&fit=crop&w=800&q=80" alt="Cafe Interior">
            <div class="overlay">
              <span>Cozy Corner</span>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1517705008128-361805f42e86?auto=format&fit=crop&w=800&q=80" alt="Barista">
            <div class="overlay">
              <span>Our Barista</span>
            </div>
          </div>
        </div>

        <div class="item">
          <div class="hover-box">
            <img src="https://images.unsplash.com/photo-1459755486867-b55449bb39ff?auto=format&fit=crop&w=800&q=80" alt="Coffee Shop">
            <div class="overlay">
              <span>Good Vibes</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
